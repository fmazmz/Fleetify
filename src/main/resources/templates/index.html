<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="/css/global.css"/>
    <title>Fleetify - Premium Car Rental Service</title>
</head>


<body>

<div class="navbar">
    <div class="navbar-left">
        <h1>Fleetify</h1>
    </div>

    <div class="navbar-right">
        <a href="/drivers/new" sec:authorize="hasRole('APP_USER')">Become a Driver</a>

        <form th:action="@{/login}" method="get" sec:authorize="!isAuthenticated()">
            <button type="submit">Login</button>
        </form>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">Logout</button>
        </form>
    </div>
</div>

<div class="secondary-nav">
    <div class="nav-section">
        <p>CARS</p>
        <a href="/cars" sec:authorize="hasAnyRole('ADMIN', 'APP_USER', 'DRIVER')">Browse Cars</a>
        <a href="/cars/new" sec:authorize="hasRole('ADMIN')">Add New Car</a>
    </div>

    <div class="nav-section">
        <p>BOOKINGS</p>
        <a href="/bookings/new" sec:authorize="hasRole('DRIVER')">Book a Car</a>
        <a href="/bookings" sec:authorize="hasRole('ADMIN')">Bookings</a>
    </div>

    <div class="nav-section">
        <p>DRIVERS</p>
        <a href="/drivers" sec:authorize="hasRole('ADMIN')">Drivers</a>
    </div>
</div>

</body>
</html>
