<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Browse Cars</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/tables.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/forms.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-header">
    <h2>Browse Cars</h2>
</div>

<div class="list-container cars-list-container">

    <div class="form-container-simple" style="margin-bottom: 24px;">
        <form class="form-simple" th:action="@{/cars}" method="get">

            <div class="form-field-simple">
                <label for="q">Search</label>
                <div class="form-field-input">
                    <input type="text"
                           id="q"
                           name="q"
                           th:value="${filter.q}"
                           placeholder="Search make, model, plate, VIN">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="make">Make</label>
                <div class="form-field-input">
                    <input type="text"
                           id="make"
                           name="make"
                           th:value="${filter.make}"
                           placeholder="BMW">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="model">Model</label>
                <div class="form-field-input">
                    <input type="text"
                           id="model"
                           name="model"
                           th:value="${filter.model}"
                           placeholder="X5">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="year">Year</label>
                <div class="form-field-input">
                    <input type="number"
                           id="year"
                           name="year"
                           th:value="${filter.year}"
                           placeholder="2022">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="minPrice">Min Price</label>
                <div class="form-field-input">
                    <input type="number"
                           step="0.01"
                           id="minPrice"
                           name="minPrice"
                           th:value="${filter.minPrice}"
                           placeholder="10.00">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="maxPrice">Max Price</label>
                <div class="form-field-input">
                    <input type="number"
                           step="0.01"
                           id="maxPrice"
                           name="maxPrice"
                           th:value="${filter.maxPrice}"
                           placeholder="100.00">
                </div>
            </div>

            <div class="form-field-simple">
                <label for="sort">Sort By</label>
                <div class="form-field-input">
                    <select id="sort" name="sort">
                        <option value="make,asc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'make,asc')}">
                            Make A-Z
                        </option>
                        <option value="make,desc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'make,desc')}">
                            Make Z-A
                        </option>
                        <option value="model,asc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'model,asc')}">
                            Model A-Z
                        </option>
                        <option value="model,desc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'model,desc')}">
                            Model Z-A
                        </option>
                        <option value="hourlyPrice,asc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'hourlyPrice,asc')}">
                            Price Low-High
                        </option>
                        <option value="hourlyPrice,desc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'hourlyPrice,desc')}">
                            Price High-Low
                        </option>
                        <option value="year,desc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'year,desc')}">
                            Newest
                        </option>
                        <option value="year,asc"
                                th:selected="${param.sort != null and #strings.contains(param.sort[0], 'year,asc')}">
                            Oldest
                        </option>
                    </select>
                </div>
            </div>

            <div class="button-container-simple" style="justify-content: flex-start; gap: 10px;">
                <button type="submit">Apply</button>
                <a th:href="@{/cars}">
                    <button type="button">Clear</button>
                </a>
            </div>

        </form>
    </div>

    <table class="data-table" th:if="${!cars.content.isEmpty()}">
        <thead>
        <tr>
            <th>Make</th>
            <th>Model</th>
            <th>Hourly Price</th>
            <th>Licence Plate</th>
            <th>VIN</th>
            <th>Year</th>
            <th>View</th>
            <th sec:authorize="hasRole('ADMIN')">Update</th>
            <th sec:authorize="hasRole('ADMIN')">Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${cars.content}">
            <td th:text="${c.make}">Make</td>
            <td th:text="${c.model}">Model</td>
            <td th:text="${c.hourlyPrice}">Hourly Price</td>
            <td th:text="${c.licencePlate}">Licence Plate</td>
            <td th:text="${c.vin}">VIN</td>
            <td th:text="${c.year}">Year</td>

            <td>
                <a th:href="@{/cars/{id}(id=${c.id})}">
                    <button type="button">View</button>
                </a>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/cars/{id}/update(id=${c.id})}">
                    <button type="button">Update</button>
                </a>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/cars/{id}/delete(id=${c.id})}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${cars.content.isEmpty()}" style="text-align: center; padding: 30px;">
        <p>No cars matched your filters.</p>
        <a th:href="@{/cars}">
            <button type="button">Show All Cars</button>
        </a>
    </div>

</div>

<div class="pagination">

    <a th:if="${cars.hasPrevious()}"
       th:href="@{/cars(
           page=${cars.number-1},
           q=${param.q},
           make=${param.make},
           model=${param.model},
           year=${param.year},
           minPrice=${param.minPrice},
           maxPrice=${param.maxPrice},
           licencePlate=${param.licencePlate},
           vin=${param.vin},
           sort=${param.sort}
       )}">
        Previous
    </a>

    <span>
        Page <span th:text="${cars.number + 1}"></span>
        of <span th:text="${cars.totalPages}"></span>
    </span>

    <a th:if="${cars.hasNext()}"
       th:href="@{/cars(
           page=${cars.number+1},
           q=${param.q},
           make=${param.make},
           model=${param.model},
           year=${param.year},
           minPrice=${param.minPrice},
           maxPrice=${param.maxPrice},
           licencePlate=${param.licencePlate},
           vin=${param.vin},
           sort=${param.sort}
       )}">
        Next
    </a>

</div>

<div th:if="${success}" class="success-message">
    <span th:text="${success}"></span>
</div>

</body>
</html>
