<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="bookings-wrapper">
    <div class="bookings-card">
        <h2 class="bookings-title">My Bookings</h2>

        <div class="table-container">
            <table class="bookings-table">
                <thead>
                <tr>
                    <th>Car</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Insurance</th>
                    <th>Total Price</th>
                    <th>View</th>
                    <th>Cancel</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings.content}">
                    <td th:text="${b.carMake + ' - ' + b.carModel}">Car</td>
                    <td th:text="${#temporals.format(b.startTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">Start</td>
                    <td th:text="${#temporals.format(b.endTime.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime(), 'MMM dd, HH:mm')}">End</td>
                    <td th:text="${b.insuranceType}">Insurance</td>
                    <td th:text="${'$' + #numbers.formatDecimal(b.totalPrice, 1, 2)}">Price</td>
                    <td>
                        <a th:href="@{/bookings/{id}(id=${b.id})}">
                            <button class="btn-secondary">View</button>
                        </a>
                    </td>
                    <td>
                        <form th:action="@{/bookings/my-bookings/{id}/delete(id=${b.id})}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn-secondary btn-danger">Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-nav" th:if="${bookings.totalPages > 1}">
            <a th:if="${bookings.hasPrevious()}"
               th:href="@{/bookings/my-bookings(page=${bookings.number-1}, sort=${param.sort})}">
                Previous
            </a>
            <span>Page <span th:text="${bookings.number + 1}"></span> of <span th:text="${bookings.totalPages}"></span></span>
            <a th:if="${bookings.hasNext()}"
               th:href="@{/bookings/my-bookings(page=${bookings.number+1}, sort=${param.sort})}">
                Next
            </a>
        </div>

        <div th:if="${success}" class="message success">
            <span th:text="${success}"></span>
        </div>
    </div>
</div>
</body>
</html>
